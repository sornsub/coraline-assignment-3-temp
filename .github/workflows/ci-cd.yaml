name: Platform CI/CD Design Validation

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'release/**'
  workflow_dispatch:

jobs:
  validate-repository:
    name: Validate repository structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required documentation files
        run: |
          echo "Checking required Phase 1 and Phase 2 files..."

          REQUIRED_FILES=(
            "README.md"
            "docs/architecture.md"
            "docs/release-strategy.md"
            "docs/operations.md"
          )

          MISSING=0

          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "OK: $file"
            else
              echo "ERROR: Missing required file: $file"
              MISSING=1
            fi
          done

          if [ "$MISSING" -ne 0 ]; then
            echo "Required documentation files are missing."
            exit 1
          fi

      - name: Show git status
        run: |
          echo "Git status:"
          git status --short

  validate-markdown:
    name: Validate Markdown placeholder
    runs-on: ubuntu-latest
    needs: validate-repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List Markdown files
        run: |
          echo "Markdown files:"
          find . -type f -name "*.md" -print | sed 's|^\./||' || true

      - name: Markdown lint placeholder
        run: |
          echo "Markdown lint placeholder."
          echo "In a real pipeline, markdownlint-cli or another documentation linter would run here."
          echo "This assignment keeps the check demo-safe and dependency-free."

  validate-yaml:
    name: Validate YAML syntax
    runs-on: ubuntu-latest
    needs: validate-repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find YAML files
        run: |
          echo "YAML files:"
          find . -type f \( -name "*.yml" -o -name "*.yaml" \) -print | sed 's|^\./||' || true

      - name: Basic YAML syntax check using Ruby
        run: |
          echo "Running basic YAML syntax validation..."

          ruby -e '
            require "yaml"

            files = Dir.glob("**/*.{yml,yaml}", File::FNM_DOTMATCH).reject do |path|
              path.start_with?(".git/")
            end

            if files.empty?
              puts "No YAML files found."
              exit 0
            end

            files.each do |path|
              puts "Validating YAML file: #{path}"
              begin
                YAML.load_file(path)
              rescue Psych::SyntaxError => e
                warn "YAML syntax error in #{path}: #{e.message}"
                exit 1
              end
            end

            puts "All YAML files parsed successfully."
          '

  security-placeholder-check:
    name: Security placeholder - basic secret scan
    runs-on: ubuntu-latest
    needs: validate-repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for obvious secret-like patterns
        run: |
          echo "Scanning for obvious secret-like strings..."
          echo "This is a lightweight placeholder check, not a replacement for tools like Trivy, Gitleaks, or GitHub Secret Scanning."

          FOUND=0

          check_pattern() {
            local pattern="$1"
            echo "Checking pattern: $pattern"

            if git grep -n -I -- "$pattern" -- . \
              ':!.git' \
              ':!.github/workflows/ci-cd.yaml' \
              ':!*.png' \
              ':!*.jpg' \
              ':!*.jpeg' \
              ':!*.gif' \
              2>/dev/null; then
              echo "WARNING: Potential secret-like content found for pattern: $pattern"
              FOUND=1
            fi
          }

          check_pattern "AWS_SECRET_ACCESS_KEY"
          check_pattern "AWS_ACCESS_KEY_ID"
          check_pattern "password="
          check_pattern "passwd="
          check_pattern "api_key="
          check_pattern "private_key"
          check_pattern "BEGIN RSA PRIVATE KEY"

          if [ "$FOUND" -ne 0 ]; then
            echo "Potential secret-like content found. Please review before continuing."
            exit 1
          fi

          echo "No obvious secret-like patterns found."

  build-placeholder:
    name: Build placeholder
    runs-on: ubuntu-latest
    needs:
      - validate-repository
      - validate-markdown
      - validate-yaml
      - security-placeholder-check
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Explain build stage
        run: |
          echo "Build placeholder running for ref: $GITHUB_REF"
          echo "No real Docker build or registry push happens in this assignment."
          echo "In a real pipeline, this stage would:"
          echo "  - Build images for atlas-portal and orion-api"
          echo "  - Run tests"
          echo "  - Scan container images"
          echo "  - Push images to a private registry"
          echo "  - Tag images as sha-<short-sha> or release-<version>"

  deploy-dev-placeholder:
    name: Deploy to dev placeholder
    runs-on: ubuntu-latest
    needs: build-placeholder
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Explain dev deployment
        run: |
          echo "Dev deployment placeholder."
          echo "Trigger: push to main."
          echo "Target: dev.sornsub.online / platform-dev."
          echo "In a real pipeline, Helm would deploy the application to the dev namespace."
          echo "No real Kubernetes deployment is performed."

  deploy-staging-placeholder:
    name: Deploy to staging placeholder
    runs-on: ubuntu-latest
    needs: build-placeholder
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release/')
    steps:
      - name: Explain staging deployment
        run: |
          echo "Staging deployment placeholder."
          echo "Trigger: release/* tag."
          echo "Target: staging.sornsub.online / platform-staging."
          echo "In a real pipeline, the release image would be deployed to staging using Helm."
          echo "No real Kubernetes deployment is performed."

  promote-prod-placeholder:
    name: Promote to prod placeholder
    runs-on: ubuntu-latest
    needs:
      - validate-repository
      - validate-markdown
      - validate-yaml
      - security-placeholder-check
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production
    steps:
      - name: Explain production promotion
        run: |
          echo "Production promotion placeholder."
          echo "Trigger: manual workflow_dispatch."
          echo "Target: prod.sornsub.online / platform-prod."
          echo "In a real setup, GitHub Environments can require approval before this job runs."
          echo "The same release image tested in staging would be promoted to production."
          echo "No real deployment or cloud action is performed."

      - name: Summarise environment mapping
        run: |
          echo "Environment mapping:"
          echo "  - pull_request: validation only"
          echo "  - push to main: build placeholder + dev placeholder"
          echo "  - push release/* tag: build placeholder + staging placeholder"
          echo "  - workflow_dispatch: production promotion placeholder"